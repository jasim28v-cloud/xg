<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>👑 GKOM | إعدادات</title><script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"><style>:root{--accent:#f59e0b;--border:rgba(245,158,11,0.12);--bg:#0a0a0a;--glass:rgba(184,134,11,0.03)}*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:#fff;min-height:100vh}.header{display:flex;align-items:center;gap:12px;padding:16px;border-bottom:1px solid var(--border)}.btn-back{background:rgba(245,158,11,0.1);border:1px solid var(--border);width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer}.setting-item{display:flex;justify-content:space-between;align-items:center;padding:16px;border-bottom:1px solid var(--border);cursor:pointer}.setting-item:hover{background:var(--glass)}.btn-danger{background:rgba(239,68,68,0.2);border:1px solid rgba(239,68,68,0.3);color:#f87171;padding:12px 24px;border-radius:30px;cursor:pointer;margin:20px auto;display:block}</style></head><body><div class="header"><button class="btn-back" onclick="window.location.href='index.html'"><i class="fas fa-arrow-right"></i></button><h2>👑 إعدادات</h2></div><div><div class="setting-item" onclick="window.location.href='profile.html'"><span>👤 الملف الشخصي</span><i class="fas fa-chevron-left"></i></div><div class="setting-item"><span>🔒 الخصوصية</span></div><div class="setting-item"><span>🌐 اللغة: العربية</span></div><div class="setting-item"><span>ℹ️ GKOM v2026.1 👑</span></div><button class="btn-danger" onclick="if(confirm('تسجيل الخروج؟')){auth.signOut();window.location.href='auth.html'}"><i class="fas fa-sign-out-alt"></i> خروج</button></div><script src="firebase-config.js"></script><script>auth.onAuthStateChanged(u=>{if(!u)window.location.href='auth.html'})</script></body></html>
