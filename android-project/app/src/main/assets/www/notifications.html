<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>👑 GKOM | إشعارات</title><script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"><style>:root{--accent:#f59e0b;--border:rgba(245,158,11,0.12);--bg:#0a0a0a}*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:#fff;min-height:100vh}.header{display:flex;align-items:center;gap:12px;padding:16px;border-bottom:1px solid var(--border)}.btn-back{background:rgba(245,158,11,0.1);border:1px solid var(--border);width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer}.notif-item{display:flex;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border)}.notif-icon{width:40px;height:40px;border-radius:50%;background:rgba(245,158,11,0.1);display:flex;align-items:center;justify-content:center;color:var(--accent)}</style></head><body><div class="header"><button class="btn-back" onclick="window.location.href='index.html'"><i class="fas fa-arrow-right"></i></button><h2>👑 إشعارات</h2></div><div id="notifsList"></div><script src="firebase-config.js"></script><script>auth.onAuthStateChanged(async u=>{if(!u)window.location.href='auth.html';const s=await db.ref('notifications/'+u.uid).once('value'),ns=s.val()||{},items=Object.values(ns).reverse(),c=document.getElementById('notifsList');c.innerHTML=items.length?items.map(n=>`<div class="notif-item"><div class="notif-icon"><i class="fas fa-bell"></i></div><div><div style="font-weight:600">${n.from||'مستخدم'}</div><div style="font-size:12px;opacity:0.6">${n.msg||''}</div></div></div>`).join(''):'<div style="text-align:center;opacity:0.5;padding:40px"><i class="fas fa-bell" style="font-size:48px;color:#f59e0b;display:block;margin-bottom:12px"></i><p>لا إشعارات</p></div>'})</script></body></html>
