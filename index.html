<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>instagrami ❤️ | منصة اجتماعية عصرية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }
        
        /* شاشة تسجيل الدخول */
        .login-screen {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: radial-gradient(circle at 30% 10%, #0f0f1a, #050505);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: rgba(15, 15, 26, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 40px 32px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(236, 72, 153, 0.3);
            box-shadow: 0 0 40px rgba(236, 72, 153, 0.2);
            animation: fadeInUp 0.5s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-card h1 {
            font-size: 42px;
            font-weight: 800;
            background: linear-gradient(135deg, #ec489a, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }
        .login-card input {
            width: 100%;
            padding: 14px 18px;
            margin: 10px 0;
            border-radius: 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            font-size: 15px;
            transition: all 0.3s;
        }
        .login-card input:focus {
            outline: none;
            border-color: #ec489a;
            background: rgba(236, 72, 153, 0.1);
        }
        .login-card button {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            background: linear-gradient(135deg, #ec489a, #06b6d4);
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .login-card button:active { transform: scale(0.98); }
        .auth-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            background: rgba(255,255,255,0.03);
            border-radius: 60px;
            padding: 4px;
        }
        .auth-tab {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            border-radius: 60px;
            transition: all 0.3s;
        }
        .auth-tab.active {
            background: linear-gradient(135deg, #ec489a, #06b6d4);
            color: white;
            box-shadow: 0 0 15px rgba(236, 72, 153, 0.5);
        }
        .auth-form { display: none; }
        .auth-form.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .version { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 24px; }
        
        /* التطبيق الرئيسي */
        #mainApp { display: none; height: 100vh; background: #0a0a0a; position: relative; overflow-y: auto; }
        
        /* شريط علوي */
        .top-bar {
            position: sticky;
            top: 0;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 50;
        }
        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #ec489a, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .top-icons { display: flex; gap: 20px; }
        .top-icon {
            background: none;
            border: none;
            font-size: 22px;
            color: #fff;
            cursor: pointer;
            transition: 0.2s;
        }
        .top-icon:hover { color: #ec489a; }
        
        /* القصص */
        .stories-container {
            padding: 16px 20px;
            display: flex;
            gap: 20px;
            overflow-x: auto;
            scrollbar-width: thin;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .story-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .story-ring {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ec489a, #06b6d4);
            padding: 2px;
        }
        .story-avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: #1a1a2a;
        }
        .story-name {
            font-size: 11px;
            color: rgba(255,255,255,0.7);
            max-width: 70px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        /* المنشورات – فيديو طولي 9:16 */
        .feed-container { padding: 16px 0 80px; }
        .post-card {
            background: #111;
            border-radius: 20px;
            margin-bottom: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.2s;
        }
        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
        }
        .post-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ec489a, #06b6d4);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
        }
        .post-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .post-user {
            font-weight: 600;
            cursor: pointer;
            flex: 1;
        }
        .follow-small {
            background: rgba(236, 72, 153, 0.2);
            border: 1px solid rgba(236, 72, 153, 0.3);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
        }
        /* حاوية الفيديو الطولي 9:16 */
        .media-container {
            position: relative;
            background: #000;
            width: 100%;
            aspect-ratio: 9 / 16;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .post-media {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* علامة مائية على الفيديوهات */
        .video-watermark {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            color: rgba(255,255,255,0.9);
            pointer-events: none;
            z-index: 5;
            font-family: system-ui;
        }
        .video-watermark i { color: #ec489a; margin-left: 4px; }
        .post-actions {
            display: flex;
            gap: 24px;
            padding: 12px 16px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .action-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .action-btn.active { color: #ec489a; }
        .action-btn span { font-size: 14px; }
        .post-caption { padding: 0 16px 12px; font-size: 14px; line-height: 1.4; }
        .hashtag { color: #06b6d4; cursor: pointer; }
        .post-time { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 6px; }
        
        /* شريط سفلي */
        .bottom-nav {
