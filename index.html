<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Tokixx | منصة الفيديوهات القصيرة</title>
  <link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAAACXBIWXMAAAsTAAALEwEAmpwYAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAGwSURBVHgB7Zc9TsNAEIVf4gJ0lIgO0UV6bkADHIGKGzhCUoCQaKgQHIGKEiEhUUFEBxIdDZJjORqssb32OpsUUSLxlGeSke3Pnp3ZnV0DAAAAAACAP+JKulUzaY+kaZImSVokaZ6kdZLWSTok6ZikW5IepPZ3DdYk6V7GptJzT/37WZJGSdoknZTeM61nZ0nKz/2qfs6U9k9JmqT2H0nLJJ3TOI9DkvZJ2k1tL/M6SZp1Xy8k6U76nkj7VEl6k9Y+Ud9VJZ1L+0aSpmnrU9Jm5V2X9KntH9L3JM1T1zNhYLHqutK5LfU90D5O35n0nUXt8+hH0nNpX0N9P5T2Q+mbkz6V7pWkI+nfSPdW0pr08GgOyls5I6nQ/SnV+wwAAAAAAH6B45TAg7ZfUj/cWZLW0vOvtH6W9EFlPVM/00q2Y3UvSfqUmln0LKVzvqS+RZqTqvk+SXpXmU+0tpm0j6TzgOq7JkniPdY20taPpP1QGn+m2pdojL+lbZP0z7Y0h+skTXXcnTQ+xzZS3mdJf2vblvbT0jlfUttA+j6WjnuS9gUAAAAAAADgj/gC0OKqW9oYcFkAAAAASUVORK5CYII=">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }
    body {
      background-color: #000;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      position: fixed;
    }
    .app-container {
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    .view {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      background: #000;
      visibility: hidden;
      opacity: 0;
      transition: visibility 0.2s, opacity 0.2s;
      z-index: 10;
    }
    .view.active {
      visibility: visible;
      opacity: 1;
      z-index: 20;
    }
    .site-header {
      position: fixed;
      top: 0;
      right: 0;
      left: 0;
      height: 60px;
      background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
      z-index: 50;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 0 20px;
      pointer-events: none;
    }
    .site-title {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      padding: 8px 20px;
      border-radius: 40px;
      pointer-events: auto;
    }
    .site-title h2 {
      color: white;
      font-size: 18px;
      font-weight: 700;
      margin: 0;
    }
    .site-title i {
      color: #ff0050;
      font-size: 20px;
      animation: heartbeat 1.5s infinite;
    }
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }
    .feed-container {
      height: 100%;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }
    .video-item {
      position: relative;
      width: 100%;
      height: 100vh;
      scroll-snap-align: start;
      background: #0a0a0a;
      overflow: hidden;
    }
    .video-element {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }
    .watermark {
      position: absolute;
      bottom: 20px;
      right: 20px;
      z-index: 12;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(5px);
      padding: 6px 12px;
      border-radius: 30px;
      color: rgba(255,255,255,0.8);
      font-size: 12px;
      font-weight: 500;
      pointer-events: none;
      font-family: monospace;
    }
    .watermark i {
      color: #ff0050;
      margin-right: 5px;
    }
    .hashtags {
      margin-top: 5px;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }
    .hashtag {
      color: #20d5ec;
      font-size: 12px;
      background: rgba(0,0,0,0.4);
      padding: 2px 8px;
      border-radius: 20px;
    }
    .floating-right {
      position: absolute;
      bottom: 100px;
      right: 12px;
      z-index: 15;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    .action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      border-radius: 50px;
      padding: 6px 0 4px;
      width: 52px;
      transition: transform 0.1s;
      cursor: pointer;
    }
    .action-btn:active {
      transform: scale(0.92);
    }
    .action-btn i {
      font-size: 28px;
      color: white;
      text-shadow: 0 1px 2px rgba(0,0,0,0.3);
    }
    .action-btn span {
      font-size: 12px;
      font-weight: 600;
      color: white;
    }
    .avatar-ring {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 2px solid white;
      background: #ccc;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .avatar-ring img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .video-info {
      position: absolute;
      bottom: 20px;
      left: 16px;
      right: 80px;
      z-index: 15;
      color: white;
      text-shadow: 0 1px 2px black;
    }
    .username {
      font-weight: 700;
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
    }
    .verified-icon {
      color: #20d5ec;
      font-size: 14px;
    }
    .caption {
      font-size: 14px;
      font-weight: 400;
      margin-bottom: 8px;
      line-height: 1.3;
    }
    /* واجهة تسجيل الدخول */
    .auth-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(15px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }
    .auth-modal.hide {
      display: none;
    }
    .auth-card {
      background: #1a1a1a;
      border-radius: 32px;
      width: 90%;
      max-width: 400px;
      padding: 30px 25px;
      text-align: center;
      box-shadow: 0 0 40px rgba(255,0,80,0.3);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .auth-card h2 {
      color: white;
      margin-bottom: 25px;
      font-size: 28px;
    }
    .auth-card h2 i {
      color: #ff0050;
    }
    .auth-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
    }
    .auth-tab {
      flex: 1;
      padding: 10px;
      background: #2c2c2c;
      border: none;
      border-radius: 40px;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      font-weight: bold;
    }
    .auth-tab.active {
      background: #ff0050;
    }
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .auth-form.hidden {
      display: none;
    }
    .auth-input {
      background: #2c2c2c;
      border: none;
      padding: 14px 18px;
      border-radius: 40px;
      color: white;
      font-size: 16px;
      outline: none;
      width: 100%;
    }
    .auth-btn {
      background: #ff0050;
      border: none;
      padding: 14px;
      border-radius: 40px;
      color: white;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.2s;
    }
    .auth-btn:active {
      transform: scale(0.97);
    }
    .auth-message {
      color: #ffaa00;
      font-size: 13px;
      margin-top: 10px;
    }
    /* باقي الأنماط كما هي ... (محذوفة للاختصار) */
    .bottom-nav, .chat-container, .admin-panel, .profile-header, .grid-3, .comment-overlay {
      /* نفس الأنماط السابقة */
    }
    /* إعادة تعريف الأنماط الأساسية المفقودة */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 80px;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(20px);
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 100;
      border-top: 0.5px solid rgba(255,255,255,0.1);
    }
    .nav-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: #8e8e8e;
      font-size: 24px;
      cursor: pointer;
    }
    .nav-icon.active {
      color: #ff0050;
    }
    .nav-label {
      font-size: 10px;
      font-weight: 500;
    }
    .toast-msg {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.9);
      color: white;
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 13px;
      z-index: 300;
      pointer-events: none;
      opacity: 0;
      transition: 0.2s;
    }
    .loading {
      color: white;
      text-align: center;
      margin-top: 40vh;
    }
    .admin-icon {
      position: fixed;
      top: 70px;
      left: 15px;
      background: #ff0050;
      border-radius: 50%;
      width: 45px;
      height: 45px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 60;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(255,0,80,0.5);
      display: none;
    }
    .admin-panel {
      position: fixed;
      top: 70px;
      left: 10px;
      right: 10px;
      background: #1a1a1a;
      border-radius: 20px;
      z-index: 150;
      max-height: 80vh;
      overflow-y: auto;
      display: none;
      border: 1px solid #ff0050;
    }
    .admin-panel.show {
      display: block;
    }
    .admin-header {
      background: #ff0050;
      padding: 15px;
      border-radius: 20px 20px 0 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: white;
    }
    .admin-item {
      padding: 12px;
      border-bottom: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: white;
    }
    .delete-btn, .ban-btn {
      background: #ff0050;
      border: none;
      padding: 5px 12px;
      border-radius: 20px;
      color: white;
      cursor: pointer;
      margin-left: 5px;
    }
    .ban-btn {
      background: #ffaa00;
    }
    .profile-header {
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .profile-pic {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff0050, #20d5ec);
      background-size: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      color: white;
    }
    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      background: #000;
      margin-top: 10px;
    }
    .grid-item {
      aspect-ratio: 1 / 1;
      background: #1e1e1e;
      position: relative;
      background-size: cover;
      background-position: center;
      cursor: pointer;
    }
    .comment-overlay {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 0%;
      background: rgba(0,0,0,0.95);
      z-index: 200;
      transition: height 0.3s ease;
      backdrop-filter: blur(8px);
      border-top-left-radius: 20px;
      border-top-right-radius: 20px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .comment-overlay.open {
      height: 70%;
    }
    .comment-header {
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 0.5px solid rgba(255,255,255,0.2);
      color: white;
    }
    .comment-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .comment-item {
      display: flex;
      gap: 12px;
    }
    .comment-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #333;
      flex-shrink: 0;
      object-fit: cover;
    }
    .comment-content {
      flex: 1;
    }
    .comment-name {
      color: white;
      font-weight: 600;
      font-size: 14px;
    }
    .comment-time {
      color: #aaa;
      font-size: 10px;
      margin-left: 8px;
    }
    .comment-text {
      color: #efefef;
      font-size: 14px;
      margin: 4px 0;
    }
    .comment-input-area {
      padding: 12px 16px;
      background: #1a1a1a;
      display: flex;
      gap: 10px;
      align-items: center;
      border-top: 0.5px solid #2c2c2c;
    }
    .comment-input {
      flex: 1;
      background: #2c2c2c;
      border: none;
      border-radius: 30px;
      padding: 10px 16px;
      color: white;
      font-size: 14px;
      outline: none;
    }
    .chat-container {
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .chat-users-list {
      background: #111;
      padding: 10px;
      border-bottom: 1px solid #333;
      overflow-x: auto;
      white-space: nowrap;
    }
    .chat-user {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      margin: 0 8px;
      cursor: pointer;
    }
    .chat-user img {
      width: 50px;
      height: 50px;
      border-radius: 50%;
    }
    .chat-messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .chat-bubble {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 20px;
      font-size: 14px;
    }
    .chat-bubble.sent {
      background: #ff0050;
      color: white;
      align-self: flex-end;
    }
    .chat-bubble.received {
      background: #2c2c2c;
      color: white;
      align-self: flex-start;
    }
    .chat-bubble img {
      max-width: 200px;
      border-radius: 12px;
      margin-top: 5px;
    }
    .chat-input-area {
      padding: 10px;
      background: #1a1a1a;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .chat-input {
      flex: 1;
      background: #2c2c2c;
      border: none;
      border-radius: 30px;
      padding: 10px;
      color: white;
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="site-header">
    <div class="site-title">
      <i class="fas fa-heart"></i>
      <h2>Tokixx</h2>
    </div>
  </div>

  <!-- نافذة تسجيل الدخول -->
  <div id="authModal" class="auth-modal">
    <div class="auth-card">
      <h2><i class="fas fa-video"></i> Tokixx</h2>
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">تسجيل الدخول</button>
        <button class="auth-tab" data-tab="register">إنشاء حساب</button>
      </div>
      <div id="loginForm" class="auth-form">
        <input type="email" id="loginEmail" class="auth-input" placeholder="البريد الإلكتروني" autocomplete="email">
        <input type="password" id="loginPassword" class="auth-input" placeholder="كلمة المرور" autocomplete="current-password">
        <button id="loginBtn" class="auth-btn">دخول</button>
        <div id="loginMessage" class="auth-message"></div>
      </div>
      <div id="registerForm" class="auth-form hidden">
        <input type="text" id="regUsername" class="auth-input" placeholder="اسم المستخدم">
        <input type="email" id="regEmail" class="auth-input" placeholder="البريد الإلكتروني">
        <input type="password" id="regPassword" class="auth-input" placeholder="كلمة المرور">
        <button id="registerBtn" class="auth-btn">إنشاء حساب</button>
        <div id="registerMessage" class="auth-message"></div>
      </div>
    </div>
  </div>

  <!-- باقي الواجهات -->
  <div id="homeView" class="view">
    <div class="feed-container" id="feedContainer"><div class="loading"><i class="fas fa-spinner fa-spin"></i> جاري التحميل...</div></div>
  </div>
  <div id="chatView" class="view">
    <div class="chat-container">
      <div class="chat-users-list" id="chatUsersList"></div>
      <div class="chat-messages-area" id="chatMessagesArea"></div>
      <div class="chat-input-area">
        <input type="text" id="chatMessageInput" class="chat-input" placeholder="اكتب رسالة...">
        <input type="file" id="chatImageInput" accept="image/*" style="display:none">
        <i class="fas fa-image" id="chatImageBtn" style="color:#ff0050; font-size:24px; cursor:pointer"></i>
        <i class="fas fa-paper-plane" id="chatSendBtn" style="color:#ff0050; font-size:24px; cursor:pointer"></i>
      </div>
    </div>
  </div>
  <div id="profileView" class="view">
    <div class="profile-header">
      <div class="profile-pic" id="profilePic">👤</div>
      <h3 style="color:white;" id="profileUsername">مستخدم</h3>
      <div class="profile-buttons">
        <button class="profile-btn" id="editProfileBtn"><i class="fas fa-user-edit"></i> تعديل الملف</button>
        <button class="profile-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> تسجيل خروج</button>
      </div>
    </div>
    <div class="grid-3" id="profileGrid"></div>
  </div>

  <div class="bottom-nav">
    <div class="nav-icon" data-nav="home"><i class="fas fa-home"></i><span class="nav-label">الرئيسية</span></div>
    <div class="nav-icon" data-nav="chat"><i class="fas fa-comment-dots"></i><span class="nav-label">الدردشة</span></div>
    <div class="nav-icon" data-nav="profile"><i class="fas fa-user"></i><span class="nav-label">الملف</span></div>
  </div>

  <div id="commentPanel" class="comment-overlay">
    <div class="comment-header"><span><i class="fas fa-comment"></i> التعليقات</span><i class="fas fa-times" id="closeComment" style="font-size:20px; cursor:pointer;"></i></div>
    <div class="comment-list" id="commentList"></div>
    <div class="comment-input-area">
      <input type="text" id="commentInput" placeholder="أضف تعليقاً..." class="comment-input">
      <i class="fas fa-paper-plane" id="sendCommentBtn" style="color:#ff0050; font-size: 22px; cursor:pointer;"></i>
    </div>
  </div>

  <div id="toastMsg" class="toast-msg"></div>
  <div id="adminIcon" class="admin-icon"><i class="fas fa-crown"></i></div>
  <div id="adminPanel" class="admin-panel">
    <div class="admin-header"><span><i class="fas fa-tachometer-alt"></i> لوحة التحكم</span><i class="fas fa-times" id="closeAdmin" style="cursor:pointer"></i></div>
    <div id="adminContent"></div>
  </div>
</div>
<script type="module" src="firebase-config.js"></script>
<script type="module" src="script.js"></script>
</body>
</html>
