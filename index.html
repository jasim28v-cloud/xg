<!-- index.html -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Tokixx | منصة الفيديوهات القصيرة</title>
  <link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAAACXBIWXMAAAsTAAALEwEAmpwYAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAGwSURBVHgB7Zc9TsNAEIVf4gJ0lIgO0UV6bkADHIGKGzhCUoCQaKgQHIGKEiEhUUFEBxIdDZJjORqssb32OpsUUSLxlGeSke3Pnp3ZnV0DAAAAAACAP+JKulUzaY+kaZImSVokaZ6kdZLWSTok6ZikW5IepPZ3DdYk6V7GptJzT/37WZJGSdoknZTeM61nZ0nKz/2qfs6U9k9JmqT2H0nLJJ3TOI9DkvZJ2k1tL/M6SZp1Xy8k6U76nkj7VEl6k9Y+Ud9VJZ1L+0aSpmnrU9Jm5V2X9KntH9L3JM1T1zNhYLHqutK5LfU90D5O35n0nUXt8+hH0nNpX0N9P5T2Q+mbkz6V7pWkI+nfSPdW0pr08GgOyls5I6nQ/SnV+wwAAAAAAH6B45TAg7ZfUj/cWZLW0vOvtH6W9EFlPVM/00q2Y3UvSfqUmln0LKVzvqS+RZqTqvk+SXpXmU+0tpm0j6TzgOq7JkniPdY20taPpP1QGn+m2pdojL+lbZP0z7Y0h+skTXXcnTQ+xzZS3mdJf2vblvbT0jlfUttA+j6WjnuS9gUAAAAAAADgj/gC0OKqW9oYcFkAAAAASUVORK5CYII=">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }
    body {
      background-color: #000;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      position: fixed;
    }
    .app-container {
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    .view {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      background: #000;
      visibility: hidden;
      opacity: 0;
      transition: visibility 0.2s, opacity 0.2s;
      z-index: 10;
    }
    .view.active {
      visibility: visible;
      opacity: 1;
      z-index: 20;
    }
    .feed-container {
      height: 100%;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }
    .video-item {
      position: relative;
      width: 100%;
      height: 100vh;
      scroll-snap-align: start;
      background: #0a0a0a;
      overflow: hidden;
    }
    .video-element {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }
    .floating-right {
      position: absolute;
      bottom: 100px;
      right: 12px;
      z-index: 15;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    .action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      border-radius: 50px;
      padding: 6px 0 4px;
      width: 52px;
      transition: transform 0.1s;
      cursor: pointer;
    }
    .action-btn:active {
      transform: scale(0.92);
    }
    .action-btn i {
      font-size: 28px;
      color: white;
      text-shadow: 0 1px 2px rgba(0,0,0,0.3);
    }
    .action-btn span {
      font-size: 12px;
      font-weight: 600;
      color: white;
    }
    .avatar-ring {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 2px solid white;
      background: #ccc;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .avatar-ring img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .video-info {
      position: absolute;
      bottom: 20px;
      left: 16px;
      right: 80px;
      z-index: 15;
      color: white;
      text-shadow: 0 1px 2px black;
    }
    .username {
      font-weight: 700;
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
    }
    .verified-icon {
      color: #20d5ec;
      font-size: 14px;
    }
    .caption {
      font-size: 14px;
      font-weight: 400;
      margin-bottom: 8px;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .sound-marquee {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px);
      padding: 5px 12px;
      border-radius: 30px;
      width: fit-content;
      max-width: 100%;
      overflow-x: auto;
      white-space: nowrap;
      scrollbar-width: thin;
      cursor: pointer;
    }
    .sound-marquee i {
      font-size: 14px;
      color: #fff;
    }
    .sound-name {
      font-size: 13px;
      font-weight: 500;
    }
    .comment-overlay {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 0%;
      background: rgba(0,0,0,0.95);
      z-index: 200;
      transition: height 0.3s ease;
      backdrop-filter: blur(8px);
      border-top-left-radius: 20px;
      border-top-right-radius: 20px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .comment-overlay.open {
      height: 70%;
    }
    .comment-header {
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 0.5px solid rgba(255,255,255,0.2);
      color: white;
    }
    .comment-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .comment-item {
      display: flex;
      gap: 12px;
    }
    .comment-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #333;
      flex-shrink: 0;
      object-fit: cover;
    }
    .comment-content {
      flex: 1;
    }
    .comment-name {
      color: white;
      font-weight: 600;
      font-size: 14px;
    }
    .comment-time {
      color: #aaa;
      font-size: 10px;
      margin-left: 8px;
    }
    .comment-text {
      color: #efefef;
      font-size: 14px;
      margin: 4px 0;
    }
    .reply-indent {
      margin-left: 48px;
      margin-top: 12px;
      border-left: 2px solid #404040;
      padding-left: 12px;
    }
    .comment-footer {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-top: 4px;
    }
    .comment-like {
      color: #aaa;
      font-size: 12px;
      cursor: pointer;
    }
    .comment-input-area {
      padding: 12px 16px;
      background: #1a1a1a;
      display: flex;
      gap: 10px;
      align-items: center;
      border-top: 0.5px solid #2c2c2c;
    }
    .comment-input {
      flex: 1;
      background: #2c2c2c;
      border: none;
      border-radius: 30px;
      padding: 10px 16px;
      color: white;
      font-size: 14px;
      outline: none;
    }
    .inbox-list {
      padding: 16px;
      background: #000;
      height: 100%;
      overflow-y: auto;
    }
    .conversation-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 0.5px solid #222;
      cursor: pointer;
    }
    .conv-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #2a2a2a;
      position: relative;
    }
    .conv-avatar img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }
    .active-dot {
      position: absolute;
      bottom: 4px;
      right: 4px;
      width: 12px;
      height: 12px;
      background: #4caf50;
      border-radius: 50%;
      border: 2px solid #000;
    }
    .conv-details {
      flex: 1;
    }
    .conv-name {
      color: white;
      font-weight: 600;
    }
    .conv-preview {
      color: #aaa;
      font-size: 13px;
    }
    .chat-view {
      display: flex;
      flex-direction: column;
      height: 100%;
      background: #000;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .bubble {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 20px;
      font-size: 14px;
    }
    .bubble.sent {
      background: #ff0050;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .bubble.received {
      background: #2c2c2c;
      color: white;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .video-preview-card {
      background: #1e1e1e;
      border-radius: 16px;
      padding: 8px;
      display: flex;
      gap: 12px;
      align-items: center;
      margin-top: 6px;
      cursor: pointer;
    }
    .creation-engine {
      background: #010101;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 20px;
    }
    .upload-area {
      background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
      border-radius: 32px;
      padding: 40px 30px;
      text-align: center;
      color: white;
      width: 90%;
      max-width: 400px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .upload-area i {
      font-size: 64px;
      color: #ff0050;
      margin-bottom: 20px;
    }
    .upload-btn {
      background: #ff0050;
      border: none;
      padding: 14px 28px;
      border-radius: 40px;
      color: white;
      font-weight: bold;
      margin-top: 20px;
      cursor: pointer;
      font-size: 16px;
      transition: all 0.2s;
    }
    .upload-btn:hover {
      background: #e60046;
      transform: scale(1.02);
    }
    .upload-btn:active {
      transform: scale(0.98);
    }
    .caption-input {
      width: 100%;
      background: #2c2c2c;
      border: none;
      border-radius: 20px;
      padding: 12px;
      margin: 15px 0;
      color: white;
      font-size: 14px;
      outline: none;
    }
    .profile-header {
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .profile-pic {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff0050, #20d5ec);
      background-size: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      color: white;
    }
    .stats-row {
      display: flex;
      gap: 32px;
      margin: 8px 0;
    }
    .stat {
      text-align: center;
      color: white;
    }
    .stat-number {
      font-size: 20px;
      font-weight: 700;
    }
    .stat-label {
      font-size: 12px;
      color: #aaa;
    }
    .profile-buttons {
      display: flex;
      gap: 16px;
    }
    .profile-btn {
      background: #2c2c2c;
      border: none;
      padding: 8px 20px;
      border-radius: 20px;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }
    .profile-btn.primary {
      background: #ff0050;
    }
    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      background: #000;
      margin-top: 10px;
    }
    .grid-item {
      aspect-ratio: 1 / 1;
      background: #1e1e1e;
      position: relative;
      background-size: cover;
      background-position: center;
      cursor: pointer;
    }
    .view-count-badge {
      position: absolute;
      bottom: 6px;
      right: 6px;
      background: rgba(0,0,0,0.7);
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 12px;
      color: white;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 80px;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(20px);
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 100;
      border-top: 0.5px solid rgba(255,255,255,0.1);
    }
    .nav-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: #8e8e8e;
      font-size: 24px;
      transition: 0.1s;
      cursor: pointer;
    }
    .nav-icon.active {
      color: #ff0050;
    }
    .nav-label {
      font-size: 10px;
      font-weight: 500;
    }
    .toast-msg {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.9);
      color: white;
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 13px;
      z-index: 300;
      pointer-events: none;
      opacity: 0;
      transition: 0.2s;
      white-space: nowrap;
    }
    .loading {
      color: white;
      text-align: center;
      margin-top: 40vh;
      font-size: 16px;
    }
    .back-button {
      position: absolute;
      top: 20px;
      right: 16px;
      z-index: 30;
      background: rgba(0,0,0,0.5);
      border-radius: 30px;
      padding: 8px 16px;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }
    .progress-bar {
      width: 100%;
      height: 4px;
      background: #333;
      border-radius: 2px;
      overflow: hidden;
      margin-top: 10px;
    }
    .progress-fill {
      height: 100%;
      background: #ff0050;
      width: 0%;
      transition: width 0.3s;
    }
  </style>
</head>
<body>
<div class="app-container">
  <div id="homeView" class="view active">
    <div class="feed-container" id="feedContainer"><div class="loading"><i class="fas fa-spinner fa-spin"></i> جاري التحميل...</div></div>
  </div>
  <div id="friendsView" class="view">
    <div class="feed-container" id="friendsFeed"><div class="loading"><i class="fas fa-spinner fa-spin"></i> جاري التحميل...</div></div>
  </div>
  <div id="creationView" class="view">
    <div class="creation-engine">
      <div class="upload-area">
        <i class="fas fa-cloud-upload-alt"></i>
        <h3 style="margin-bottom: 10px;">رفع فيديو جديد</h3>
        <p style="color: #aaa; font-size: 12px; margin-bottom: 15px;">ادعم المحتوى الإبداعي وشارك موهبتك</p>
        <input type="text" id="videoCaption" class="caption-input" placeholder="اكتب وصف الفيديو...">
        <input type="file" id="videoFile" accept="video/*" style="display: none;">
        <button class="upload-btn" id="selectVideoBtn"><i class="fas fa-plus"></i> اختر فيديو</button>
        <div id="uploadProgress" style="margin-top: 15px;"></div>
      </div>
    </div>
  </div>
  <div id="inboxView" class="view">
    <div id="inboxContainer" class="inbox-list"></div>
  </div>
  <div id="profileView" class="view">
    <div class="profile-header">
      <div class="profile-pic" id="profilePic">👤</div>
      <h3 style="color:white;" id="profileUsername">مستخدم</h3>
      <div class="stats-row">
        <div class="stat"><div class="stat-number" id="postCount">0</div><div class="stat-label">منشورات</div></div>
        <div class="stat"><div class="stat-number" id="followersCount">0</div><div class="stat-label">متابعون</div></div>
        <div class="stat"><div class="stat-number" id="totalLikes">0</div><div class="stat-label">إعجابات</div></div>
      </div>
      <div class="profile-buttons">
        <button class="profile-btn" id="editProfileBtn"><i class="fas fa-user-edit"></i> تعديل الملف</button>
        <button class="profile-btn primary" id="addFriendBtn"><i class="fas fa-user-plus"></i> إضافة أصدقاء</button>
      </div>
    </div>
    <div class="grid-3" id="profileGrid"></div>
  </div>
  <div class="bottom-nav">
    <div class="nav-icon" data-nav="home"><i class="fas fa-home"></i><span class="nav-label">الرئيسية</span></div>
    <div class="nav-icon" data-nav="friends"><i class="fas fa-user-friends"></i><span class="nav-label">أصدقاء</span></div>
    <div class="nav-icon" data-nav="creation"><i class="fas fa-plus-circle"></i><span class="nav-label">إنشاء</span></div>
    <div class="nav-icon" data-nav="inbox"><i class="fas fa-inbox"></i><span class="nav-label">الرسائل</span></div>
    <div class="nav-icon" data-nav="profile"><i class="fas fa-user"></i><span class="nav-label">الملف</span></div>
  </div>
  <div id="commentPanel" class="comment-overlay">
    <div class="comment-header"><span><i class="fas fa-comment"></i> التعليقات</span><i class="fas fa-times" id="closeComment" style="font-size:20px; cursor:pointer;"></i></div>
    <div class="comment-list" id="commentList"></div>
    <div class="comment-input-area">
      <i class="far fa-smile" style="color:white; font-size: 20px;"></i>
      <input type="text" id="commentInput" placeholder="أضف تعليقاً..." class="comment-input">
      <i class="fas fa-paper-plane" id="sendCommentBtn" style="color:#ff0050; font-size: 22px; cursor:pointer;"></i>
    </div>
  </div>
  <div id="toastMsg" class="toast-msg"></div>
</div>
<script type="module" src="firebase-config.js"></script>
<script type="module" src="script.js"></script>
</body>
</html>
