<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>instagrami ❤️ | منصة اجتماعية عصرية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }
        
        /* شاشة تسجيل الدخول – تصميم نيون */
        .login-screen {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: radial-gradient(circle at 30% 10%, #0f0f1a, #050505);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: rgba(15, 15, 26, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 40px 32px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(236, 72, 153, 0.3);
            box-shadow: 0 0 40px rgba(236, 72, 153, 0.2);
            animation: fadeInUp 0.5s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-card h1 {
            font-size: 42px;
            font-weight: 800;
            background: linear-gradient(135deg, #ec489a, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }
        .login-card input {
            width: 100%;
            padding: 14px 18px;
            margin: 10px 0;
            border-radius: 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            font-size: 15px;
            transition: all 0.3s;
        }
        .login-card input:focus {
            outline: none;
            border-color: #ec489a;
            background: rgba(236, 72, 153, 0.1);
        }
        .login-card button {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            background: linear-gradient(135deg, #ec489a, #06b6d4);
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .login-card button:active { transform: scale(0.98); }
        .auth-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            background: rgba(255,255,255,0.03);
            border-radius: 60px;
            padding: 4px;
        }
        .auth-tab {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            border-radius: 60px;
            transition: all 0.3s;
        }
        .auth-tab.active {
            background: linear-gradient(135deg, #ec489a, #06b6d4);
            color: white;
            box-shadow: 0 0 15px rgba(236, 72, 153, 0.5);
        }
        .auth-form { display: none; }
        .auth-form.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .version { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 24px; }
        
        /* التطبيق الرئيسي – تصميم حديث */
        #mainApp { display: none; height: 100vh; background: #0a0a0a; position: relative; overflow-y: auto; }
        
        /* شريط علوي */
        .top-bar {
            position: sticky;
            top: 0;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 50;
        }
        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #ec489a, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .top-icons { display: flex; gap: 20px; }
        .top-icon {
            background: none;
            border: none;
            font-size: 22px;
            color: #fff;
            cursor: pointer;
            transition: 0.2s;
        }
        .top-icon:hover { color: #ec489a; }
        
        /* القصص */
        .stories-container {
            padding: 16px 20px;
            display: flex;
            gap: 20px;
            overflow-x: auto;
            scrollbar-width: thin;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .story-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .story-ring {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ec489a, #06b6d4);
            padding: 2px;
        }
        .story-avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: #1a1a2a;
        }
        .story-name {
            font-size: 11px;
            color: rgba(255,255,255,0.7);
            max-width: 70px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        /* المنشورات */
        .feed-container { padding: 16px 0 80px; }
        .post-card {
            background: #111;
            border-radius: 20px;
            margin-bottom: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.2s;
        }
        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
        }
        .post-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ec489a, #06b6d4);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
        }
        .post-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .post-user {
            font-weight: 600;
            cursor: pointer;
            flex: 1;
        }
        .follow-small {
            background: rgba(236, 72, 153, 0.2);
            border: 1px solid rgba(236, 72, 153, 0.3);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
        }
        .media-container {
            position: relative;
            background: #000;
        }
        .post-media {
            width: 100%;
            max-height: 500px;
            object-fit: cover;
            display: block;
        }
        /* علامة مائية على الفيديوهات */
        .video-watermark {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            color: rgba(255,255,255,0.9);
            pointer-events: none;
            z-index: 5;
            font-family: system-ui;
        }
        .video-watermark i { color: #ec489a; margin-left: 4px; }
        .post-actions {
            display: flex;
            gap: 24px;
            padding: 12px 16px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .action-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .action-btn.active { color: #ec489a; }
        .action-btn span { font-size: 14px; }
        .post-caption { padding: 0 16px 12px; font-size: 14px; line-height: 1.4; }
        .hashtag { color: #06b6d4; cursor: pointer; }
        .post-time { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 6px; }
        
        /* شريط سفلي */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-around;
            padding: 12px 0 20px;
            z-index: 100;
        }
        .nav-item {
            background: none;
            border: none;
            font-size: 26px;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            transition: 0.2s;
        }
        .nav-item.active { color: #ec489a; }
        .create-btn {
            background: linear-gradient(135deg, #ec489a, #06b6d4);
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -20px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(236, 72, 153, 0.4);
        }
        
        /* اللوحات الجانبية */
        .panel {
            position: fixed;
            inset: 0;
            background: #0a0a0a;
            z-index: 200;
            transform: translateX(100%);
            transition: 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            overflow-y: auto;
        }
        .panel.open { transform: translateX(0); }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            position: sticky;
            top: 0;
            background: #0a0a0a;
        }
        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: white;
            cursor: pointer;
        }
        
        /* رفع منشور */
        .upload-area {
            border: 2px dashed rgba(236, 72, 153, 0.5);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            margin: 20px;
            cursor: pointer;
            transition: 0.3s;
        }
        .upload-area:hover { border-color: #ec489a; background: rgba(236, 72, 153, 0.05); }
        .upload-area i { font-size: 48px; color: #ec489a; }
        .search-input {
            width: calc(100% - 40px);
            margin: 20px;
            padding: 14px 18px;
            border-radius: 30px;
            background: #1a1a2a;
            border: none;
            color: white;
        }
        
        /* الملف الشخصي */
        .profile-header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, rgba(236, 72, 153, 0.2), rgba(6, 182, 212, 0.2));
        }
        .profile-avatar-large {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto;
            background: linear-gradient(135deg, #ec489a, #06b6d4);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
            border: 3px solid white;
        }
        .profile-stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 20px 0;
        }
        .stat { text-align: center; }
        .stat-number { font-size: 22px; font-weight: bold; }
        .stat-label { font-size: 12px; opacity: 0.6; }
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
        }
        .post-thumb {
            aspect-ratio: 1;
            background: #1a1a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        /* الدردشة */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            height: calc(100vh - 130px);
        }
        .chat-message {
            display: flex;
            gap: 8px;
            max-width: 85%;
        }
        .chat-message.sent {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .message-bubble {
            background: #1a1a2a;
            padding: 10px 14px;
            border-radius: 20px;
        }
        .message-bubble.sent {
            background: linear-gradient(135deg, #ec489a, #06b6d4);
            color: white;
        }
        .chat-input {
            display: flex;
            gap: 12px;
            padding: 12px;
            border-top: 1px solid rgba(255,255,255,0.05);
            background: #0a0a0a;
        }
        .chat-input input {
            flex: 1;
            padding: 12px;
            border-radius: 30px;
            background: #1a1a2a;
            border: none;
            color: white;
        }
        .conversation-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
        }
        .loading {
            text-align: center;
            padding: 50px;
            color: rgba(255,255,255,0.5);
        }
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(236, 72, 153, 0.3);
            border-top-color: #ec489a;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* لوحة الأدمن */
        .admin-panel-section {
            margin-top: 20px;
            padding: 16px;
            background: rgba(236, 72, 153, 0.1);
            border-radius: 20px;
            border: 1px solid rgba(236, 72, 153, 0.3);
        }
        .admin-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .admin-stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
        }
        .admin-stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #ec489a;
        }
        .admin-list {
            max-height: 300px;
            overflow-y: auto;
        }
        .admin-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 8px;
        }
        .admin-delete-btn, .admin-ban-btn {
            background: rgba(255,0,0,0.2);
            border: none;
            color: #ff4444;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
        }
        .admin-ban-btn {
            background: rgba(255,165,0,0.2);
            color: #ffaa44;
        }
        .edit-input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 16px;
            background: #1a1a2a;
            border: none;
            color: white;
        }
        .save-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ec489a, #06b6d4);
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<!-- شاشة تسجيل الدخول -->
<div id="loginScreen" class="login-screen">
    <div class="login-card">
        <h1>instagrami <i class="fas fa-heart" style="color:#ec489a"></i></h1>
        <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchAuth('login')">تسجيل الدخول</button>
            <button class="auth-tab" onclick="switchAuth('register')">إنشاء حساب</button>
        </div>
        <div id="loginForm" class="auth-form active">
            <input type="email" id="loginEmail" placeholder="البريد الإلكتروني">
            <input type="password" id="loginPassword" placeholder="كلمة المرور">
            <button onclick="login()">دخول</button>
            <div id="loginMsg" class="text-red-500 text-sm text-center mt-3"></div>
        </div>
        <div id="registerForm" class="auth-form">
            <input type="text" id="regName" placeholder="اسم المستخدم">
            <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
            <input type="password" id="regPass" placeholder="كلمة المرور (6 أحرف)">
            <button onclick="register()">إنشاء حساب</button>
            <div id="regMsg" class="text-red-500 text-sm text-center mt-3"></div>
        </div>
        <div class="version">الإصدار 3.1 | مارس 2026</div>
    </div>
</div>

<!-- التطبيق الرئيسي -->
<div id="mainApp">
    <div class="top-bar">
        <div class="logo">instagrami ❤️</div>
        <div class="top-icons">
            <i class="far fa-heart top-icon" onclick="openNotifications()"></i>
            <i class="far fa-paper-plane top-icon" onclick="openConversations()"></i>
        </div>
    </div>

    <!-- القصص -->
    <div id="storiesContainer" class="stories-container"><div class="loading">جاري تحميل القصص...</div></div>

    <!-- المنشورات -->
    <div id="feedContainer" class="feed-container"><div class="loading">جاري تحميل المنشورات...</div></div>

    <!-- شريط سفلي -->
    <div class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('feed')"><i class="fas fa-home"></i></button>
        <button class="nav-item" onclick="switchTab('search')"><i class="fas fa-search"></i></button>
        <div class="create-btn" onclick="openCreatePost()"><i class="fas fa-plus"></i></div>
        <button class="nav-item" onclick="switchTab('notifications')"><i class="far fa-heart"></i></button>
        <button class="nav-item" onclick="openMyProfile()"><i class="fas fa-user"></i></button>
    </div>

    <!-- لوحة إنشاء منشور -->
    <div id="createPostPanel" class="panel">
        <div class="panel-header"><h3>منشور جديد</h3><button class="close-btn" onclick="closeCreatePost()"><i class="fas fa-times"></i></button></div>
        <div class="upload-area" onclick="document.getElementById('postFileInput').click()">
            <i class="fas fa-cloud-upload-alt"></i>
            <p>اختر صورة أو فيديو</p>
        </div>
        <input type="file" id="postFileInput" accept="image/*,video/*" style="display:none" onchange="previewPostMedia(this)">
        <div id="postPreview" style="display:none; margin:16px; text-align:center"><video id="previewVideo" controls style="max-width:100%; max-height:300px"></video><img id="previewImage" style="max-width:100%; max-height:300px"></div>
        <textarea id="postCaption" class="w-[calc(100%-40px)] mx-5 p-3 rounded-xl bg-[#1a1a2a] border-none text-white" rows="3" placeholder="اكتب وصفاً... استخدم # للهاشتاقات"></textarea>
        <button onclick="uploadPost()" class="w-[calc(100%-40px)] mx-5 mt-4 bg-gradient-to-r from-[#ec489a] to-[#06b6d4] text-white p-3 rounded-xl font-bold">نشر</button>
        <div id="postStatus" class="text-center mt-4"></div>
    </div>

    <!-- لوحة البحث -->
    <div id="searchPanel" class="panel">
        <div class="panel-header"><h3>بحث</h3><button class="close-btn" onclick="closeSearch()"><i class="fas fa-times"></i></button></div>
        <input type="text" id="searchInput" class="search-input" placeholder="بحث عن مستخدمين، هاشتاقات..." onkeyup="searchAll()">
        <div id="searchResults" class="p-4"></div>
    </div>

    <!-- لوحة الإشعارات -->
    <div id="notificationsPanel" class="panel">
        <div class="panel-header"><h3>الإشعارات</h3><button class="close-btn" onclick="closeNotifications()"><i class="fas fa-times"></i></button></div>
        <div id="notificationsList" class="p-4"></div>
    </div>

    <!-- صفحة الملف الشخصي -->
    <div id="profilePanel" class="panel">
        <div class="panel-header"><button class="close-btn" onclick="closeProfile()"><i class="fas fa-arrow-right"></i></button><h3>الملف الشخصي</h3><div></div></div>
        <div class="profile-header">
            <div class="profile-avatar-large" id="profileAvatarDisplay" onclick="changeAvatar()">👤</div>
            <h2 id="profileNameDisplay" class="mt-3"></h2>
            <p id="profileBioDisplay" class="text-sm text-gray-400"></p>
            <div class="profile-stats">
                <div class="stat"><div class="stat-number" id="profilePosts">0</div><div class="stat-label">منشورات</div></div>
                <div class="stat"><div class="stat-number" id="profileFollowers">0</div><div class="stat-label">متابع</div></div>
                <div class="stat"><div class="stat-number" id="profileFollowing">0</div><div class="stat-label">يتابع</div></div>
            </div>
            <div id="profileActions"></div>
        </div>
        <div id="profilePostsGrid" class="posts-grid"></div>
    </div>

    <!-- لوحة الدردشة -->
    <div id="chatPanel" class="panel">
        <div class="panel-header"><div class="flex items-center gap-3"><div class="w-10 h-10 rounded-full bg-gradient-to-r from-[#ec489a] to-[#06b6d4] flex items-center justify-center" id="chatAvatar">👤</div><h3 id="chatUserName">محادثة</h3></div><button class="close-btn" onclick="closeChat()"><i class="fas fa-times"></i></button></div>
        <div id="chatMessages" class="chat-messages"></div>
        <div class="chat-input">
            <div class="cursor-pointer text-2xl" onclick="document.getElementById('chatImageInput').click()"><i class="fas fa-image"></i></div>
            <input type="file" id="chatImageInput" accept="image/*" style="display:none" onchange="sendChatImage(this)">
            <input type="text" id="chatMessageInput" placeholder="اكتب رسالة...">
            <button onclick="sendChatMessage()" class="bg-gradient-to-r from-[#ec489a] to-[#06b6d4] text-white px-4 rounded-full"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <!-- قائمة المحادثات -->
    <div id="conversationsPanel" class="panel">
        <div class="panel-header"><h3>الرسائل</h3><button class="close-btn" onclick="closeConversations()"><i class="fas fa-times"></i></button></div>
        <div id="conversationsList" class="p-2"></div>
    </div>

    <!-- لوحة تعديل الملف الشخصي -->
    <div id="editProfilePanel" class="panel">
        <div class="panel-header"><h3>تعديل الملف الشخصي</h3><button class="close-btn" onclick="closeEditProfile()"><i class="fas fa-times"></i></button></div>
        <div class="avatar-upload text-center p-6" onclick="changeAvatar()"><div class="profile-avatar-large" id="editAvatarDisplay">👤</div><p class="text-xs text-gray-400 mt-2">اضغط لتغيير الصورة</p></div>
        <input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="uploadAvatar(this)">
        <div class="p-4"><input type="text" id="editUsername" class="edit-input" placeholder="اسم المستخدم"><textarea id="editBio" class="edit-input" rows="3" placeholder="السيرة الذاتية"></textarea><button onclick="saveProfile()" class="save-btn">حفظ التغييرات</button></div>
    </div>
</div>

<script src="firebase-config.js"></script>
<script src="script.js"></script>
</body>
</html>
