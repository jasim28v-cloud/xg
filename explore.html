<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>👑 GKOM | استكشاف</title><script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"><style>:root{--accent:#f59e0b;--border:rgba(245,158,11,0.12);--bg:#0a0a0a}*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:#fff;min-height:100vh}.header{display:flex;align-items:center;gap:12px;padding:16px;border-bottom:1px solid var(--border)}.btn-back{background:rgba(245,158,11,0.1);border:1px solid var(--border);width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;padding:2px}.thumb{aspect-ratio:9/16;background:rgba(245,158,11,0.05);cursor:pointer;position:relative;overflow:hidden}.thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}.thumb i{position:absolute;font-size:24px;color:#fff;z-index:1;opacity:0}.thumb:hover i{opacity:1}.thumb .views{position:absolute;bottom:4px;left:4px;font-size:10px;background:rgba(0,0,0,0.6);padding:2px 6px;border-radius:10px}</style></head><body><div class="header"><button class="btn-back" onclick="window.location.href='index.html'"><i class="fas fa-arrow-right"></i></button><h2>👑 استكشاف</h2></div><div class="grid" id="exploreGrid"></div><script src="firebase-config.js"></script><script>auth.onAuthStateChanged(async u=>{if(!u)window.location.href='auth.html';const s=await db.ref('videos').once('value'),v=s.val()||{},all=Object.entries(v).map(([k,v])=>({id:k,...v})).sort((a,b)=>(b.likes||0)-(a.likes||0)),g=document.getElementById('exploreGrid');g.innerHTML=all.length?all.map(v=>`<div class="thumb" onclick="window.open('${v.url}','_blank')">${v.thumbnail?`<img src="${v.thumbnail}">`:''}<i class="fas fa-play"></i><span class="views">❤️ ${v.likes||0}</span></div>`).join(''):'<div style="grid-column:1/-1;text-align:center;padding:40px;opacity:0.5">لا فيديوهات</div>'})</script></body></html>
