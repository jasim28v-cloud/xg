name: Build Professional APK

on:
  workflow_dispatch:
    inputs:
      website_url:
        description: '🔗 رابط الموقع'
        required: true
        type: string
        default: 'https://example.com'
      
      app_name:
        description: '📱 اسم التطبيق'
        required: true
        type: string
        default: 'تطبيقي'
      
      app_id:
        description: '🆔 معرف الحزمة (com.example.app)'
        required: true
        type: string
        default: 'com.example.app'
      
      app_version:
        description: '📌 إصدار التطبيق'
        required: false
        type: string
        default: '1.0.0'
      
      icon_file:
        description: '🖼️ اسم ملف الأيقونة (ضع الملف في المستودع)'
        required: false
        type: string
        default: 'icon.png'
      
      color_primary:
        description: '🎨 اللون الرئيسي'
        required: false
        type: string
        default: '#2196F3'

jobs:
  build-pro-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 تحميل الكود من المستودع
        uses: actions/checkout@v4

      - name: 🐍 تجهيز Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 تثبيت تبعيات Python
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: 🌐 سحب الموقع مع الأيقونة
        run: |
          ICON_ARG=""
          if [ -f "${{ inputs.icon_file }}" ]; then
            ICON_ARG="-i ${{ inputs.icon_file }}"
            echo "✅ تم العثور على ملف الأيقونة: ${{ inputs.icon_file }}"
          else
            echo "⚠️ ملف الأيقونة غير موجود، سيتم تخطيه"
          fi
          
          python scraper.py "${{ inputs.website_url }}" -o www $ICON_ARG

      - name: 📋 عرض محتوى www للتأكيد
        run: |
          echo "📁 محتوى مجلد www:"
          ls -la www/
          echo ""
          echo "📁 محتوى مجلد assets:"
          ls -la www/assets/ 2>/dev/null || echo "لا يوجد مجلد assets"

      - name: 🟢 تجهيز Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📱 تثبيت Capacitor CLI
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npm install @capacitor/assets

      - name: ⚙️ إنشاء إعدادات Capacitor
        run: |
          cat > capacitor.config.json << CAPCONFIG
          {
            "appId": "${{ inputs.app_id }}",
            "appName": "${{ inputs.app_name }}",
            "webDir": "www",
            "bundledWebRuntime": false,
            "server": {
              "androidScheme": "https",
              "allowNavigation": []
            },
            "android": {
              "allowMixedContent": true
            }
          }
          CAPCONFIG

      - name: ☕ تجهيز Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🤖 تجهيز Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: 🔨 بناء مشروع Android
        run: |
          npx cap add android
          npx cap sync android

      - name: 🎨 تخصيص الأيقونة
        run: |
          # إذا كان ملف الأيقونة موجوداً في www/assets
          if [ -f "www/assets/icon.png" ]; then
            echo "🎨 جاري تخصيص الأيقونة..."
            
            # نسخ الأيقونة لمجلد الموارد
            mkdir -p android/app/src/main/res/drawable
            mkdir -p android/app/src/main/res/mipmap-hdpi
            mkdir -p android/app/src/main/res/mipmap-mdpi
            mkdir -p android/app/src/main/res/mipmap-xhdpi
            mkdir -p android/app/src/main/res/mipmap-xxhdpi
            mkdir -p android/app/src/main/res/mipmap-xxxhdpi
            
            # استخدام الأيقونة كمورد رئيسي
            cp www/assets/icon.png android/app/src/main/res/drawable/ic_launcher.png
            cp www/assets/icon.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
            cp www/assets/icon.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
            cp www/assets/icon.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
            cp www/assets/icon.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
            cp www/assets/icon.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
            
            echo "✅ تم تخصيص الأيقونة بنجاح"
          else
            echo "⚠️ لا يوجد ملف أيقونة مخصصة"
          fi

      - name: 🎨 تخصيص الألوان والثيم
        run: |
          # تحديث ملف الألوان
          cat > android/app/src/main/res/values/colors.xml << COLORSXML
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">${{ inputs.color_primary }}</color>
              <color name="colorPrimaryDark">#000000</color>
              <color name="colorAccent">${{ inputs.color_primary }}</color>
          </resources>
          COLORSXML
          
          # تحديث ملف styles.xml
          cat > android/app/src/main/res/values/styles.xml << STYLESXML
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="android:Theme.Material.Light.NoActionBar">
                  <item name="android:colorPrimary">${{ inputs.color_primary }}</item>
                  <item name="android:statusBarColor">${{ inputs.color_primary }}</item>
                  <item name="android:navigationBarColor">${{ inputs.color_primary }}</item>
              </style>
          </resources>
          STYLESXML

      - name: 📦 بناء APK Release
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📱 تجهيز اسم الملف النهائي
        id: filename
        run: |
          SANITIZED_NAME=$(echo "${{ inputs.app_name }}" | sed 's/ /_/g')
          echo "filename=${SANITIZED_NAME}_v${{ inputs.app_version }}" >> $GITHUB_OUTPUT

      - name: 📤 رفع APK كـ Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.filename.outputs.filename }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      - name: ✅ عرض ملخص البناء
        run: |
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
          
          echo ""
          echo "╔══════════════════════════════════════╗"
          echo "║     ✅ تم بناء APK بنجاح            ║"
          echo "╠══════════════════════════════════════╣"
          echo "║ 📱 التطبيق: ${{ inputs.app_name }}"
          echo "║ 🔢 الإصدار: ${{ inputs.app_version }}"
          echo "║ 📦 الحجم: $APK_SIZE"
          echo "║ 🆔 الحزمة: ${{ inputs.app_id }}"
          echo "║ 🌐 الموقع: ${{ inputs.website_url }}"
          echo "╚══════════════════════════════════════╝"
          echo ""
          echo "📥 لتحميل APK:"
          echo "   1. اذهب إلى أعلى الصفحة"
          echo "   2. اضغط على Artifacts"
          echo "   3. حمل الملف: ${{ steps.filename.outputs.filename }}"
