name: 🌹 Build Rose Sphere APK

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: '📱 اسم التطبيق'
        required: true
        type: string
        default: 'RoseSphere'
      package_name:
        description: '📦 اسم الحزمة'
        required: true
        type: string
        default: 'com.rosesphere.app'
      version:
        description: '📌 الإصدار'
        required: false
        type: string
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: python scraper.py --name "${{ github.event.inputs.app_name }}" --package "${{ github.event.inputs.package_name }}" --version "${{ github.event.inputs.version }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-v${{ github.event.inputs.version }}
          path: generated_apks/*.apk
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}-${{ github.run_number }}
          name: "${{ github.event.inputs.app_name }} v${{ github.event.inputs.version }}"
          body: |
            ## 🌹 تطبيق Rose Sphere
            
            ### 📱 صفحات التطبيق:
            - الرئيسية | تسجيل الدخول | المحادثة
            - استكشاف | الملف الشخصي | الإعدادات
            - الإشعارات | رفع
            
            ### ✨ المميزات:
            - ✅ جميع الصفحات مدمجة
            - ✅ يدعم Firebase
            - ✅ Service Worker للعمل offline
          files: generated_apks/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
