name: 🌐 Build Offline APK

on:
  workflow_dispatch:
    inputs:
      website_url:
        description: '🔗 رابط الموقع'
        required: true
        type: string
        default: 'https://xg-6vtg.onrender.com'
      app_name:
        description: '📱 اسم التطبيق (إنجليزي فقط)'
        required: true
        type: string
        default: 'XGApp'
      package_name:
        description: '📦 اسم الحزمة (مثال: com.example.app)'
        required: true
        type: string
        default: 'com.jasim28v.xgapp'
      version:
        description: '📌 الإصدار'
        required: false
        type: string
        default: '1.0.0'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    name: 🏗️ بناء APK
    
    steps:
      - name: 📥 نسخ المستودع
        uses: actions/checkout@v4

      - name: 🐍 تثبيت Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 تثبيت الاعتماديات
        run: |
          pip install requests beautifulsoup4 lxml html5lib

      - name: 🔨 بناء APK
        run: |
          python scraper.py "${{ github.event.inputs.website_url }}" \
            --name "${{ github.event.inputs.app_name }}" \
            --package "${{ github.event.inputs.package_name }}" \
            --version "${{ github.event.inputs.version }}"

      - name: 📤 رفع APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-v${{ github.event.inputs.version }}
          path: generated_apks/*.apk
          retention-days: 90

      - name: 🚀 إنشاء Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}-${{ github.run_number }}
          name: "${{ github.event.inputs.app_name }} v${{ github.event.inputs.version }}"
          files: generated_apks/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
