name: 🌐 Build Offline APK via Cordova

on:
  workflow_dispatch:
    inputs:
      website_url:
        description: '🔗 رابط الموقع'
        required: true
        type: string
        default: 'https://xg-6vtg.onrender.com'
      app_name:
        description: '📱 اسم التطبيق (إنجليزي فقط)'
        required: true
        type: string
        default: 'XGApp'
      package_name:
        description: '📦 اسم الحزمة (مثال: com.example.app)'
        required: true
        type: string
        default: 'com.jasim28v.xgapp'
      version:
        description: '📌 الإصدار'
        required: false
        type: string
        default: '1.0.0'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 نسخ المستودع
        uses: actions/checkout@v4

      - name: 🐍 تثبيت Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🟢 تثبيت Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: ☕ تثبيت وتجهيز Java 11 (المتوافقة مع Cordova)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'

      - name: 🤖 إعداد بيئة Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 تثبيت مكتبات بايثون و أداة Cordova
        run: |
          pip install requests beautifulsoup4 lxml html5lib
          npm install -g cordova

      - name: 🌐 تشغيل سكربت البايثون لسحب ملفات الموقع
        run: |
          python scraper.py "${{ github.event.inputs.website_url }}" \
            --name "${{ github.event.inputs.app_name }}" \
            --package "${{ github.event.inputs.package_name }}" \
            --version "${{ github.event.inputs.version }}"

      - name: 🏗️ إنشاء مشروع أندرويد حقيقي عبر Cordova وبنائه
        run: |
          # إنشاء مشروع كوردوفا فارغ
          cordova create myApp "${{ github.event.inputs.package_name }}" "${{ github.event.inputs.app_name }}"
          
          # استبدال مجلد الويب الافتراضي بالموقع الذي تم سحبه بواسطة البايثون
          rm -rf myApp/www
          mv www myApp/www
          
          cd myApp
          # إضافة منصة أندرويد للمشروع
          cordova platform add android
          
          # بناء ملف الـ APK الفعلي والمترجم
          cordova build android --release
          
          # تجهيز المجلد النهائي لرفع الملف
          mkdir -p ../generated_apks
          cp platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk ../generated_apks/${{ github.event.inputs.app_name }}.apk

      - name: 📤 رفع APK النهائي كـ Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-v${{ github.event.inputs.version }}
          path: generated_apks/*.apk
          retention-days: 90

      - name: 🚀 إنشاء Release على جيتهاب
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}-${{ github.run_number }}
          name: "${{ github.event.inputs.app_name }} v${{ github.event.inputs.version }}"
          files: generated_apks/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
