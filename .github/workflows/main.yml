name: Build MNAENCA APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 جلب الكود
        uses: actions/checkout@v4
      
      - name: 🐍 تجهيز بايثون
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: ⚡ تشغيل مولد MNAENCA (scraper.py)
        run: python scraper.py
      
      - name: ☕ تجهيز Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: 📦 تحميل gradle-wrapper.jar
        run: |
          cd android-project
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "تحميل gradle-wrapper.jar..."
            curl -L https://github.com/gradle/gradle/raw/v8.5.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          fi
      
      - name: 🔧 بناء APK
        run: |
          cd android-project
          chmod +x gradlew
          ./gradlew assembleDebug
      
      - name: 📤 رفع APK الناتج
        uses: actions/upload-artifact@v4
        with:
          name: MNAENCA-Gold-APK
          path: android-project/app/build/outputs/apk/debug/*.apk
          retention-days: 90
