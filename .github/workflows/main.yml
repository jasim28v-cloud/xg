name: 📁 Create Android Project

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'اسم التطبيق'
        required: true
        default: 'Rose Sphere'
      package_name:
        description: 'اسم الحزمة'
        required: true
        default: 'com.rosesphere.app'
      version:
        description: 'الإصدار'
        required: false
        default: '1.0.0'

jobs:
  create-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 🏗️ إنشاء مشروع Android
        run: |
          python scraper.py \
            --name "${{ github.event.inputs.app_name }}" \
            --package "${{ github.event.inputs.package_name }}" \
            --version "${{ github.event.inputs.version }}"
      
      - name: 📤 رفع المشروع
        uses: actions/upload-artifact@v4
        with:
          name: android-project
          path: android_project/
