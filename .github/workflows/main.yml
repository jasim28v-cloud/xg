name: 🚀 Build RoseSphere APK

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: '📱 اسم التطبيق'
        required: true
        default: 'Rose Sphere'
      package_name:
        description: '📦 اسم الحزمة'
        required: true
        default: 'com.rosesphere.app'
      version:
        description: '📌 الإصدار'
        required: false
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: 📥 سحب المستودع
        uses: actions/checkout@v4
        
      - name: ☕ إعداد Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: 🤖 إعداد Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'
          
      - name: 🐍 إعداد Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: 🔨 بناء APK
        run: |
          python scraper.py \
            --name "${{ github.event.inputs.app_name }}" \
            --package "${{ github.event.inputs.package_name }}" \
            --version "${{ github.event.inputs.version }}"
          
      - name: 📤 رفع APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-v${{ github.event.inputs.version }}
          path: output/*.apk
          retention-days: 90
          
      - name: 🚀 إنشاء Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}-${{ github.run_number }}
          name: "${{ github.event.inputs.app_name }} v${{ github.event.inputs.version }}"
          body: |
            ## 🌹 Rose Sphere APK
            
            - **التطبيق:** ${{ github.event.inputs.app_name }}
            - **الإصدار:** ${{ github.event.inputs.version }}
            - **الحزمة:** ${{ github.event.inputs.package_name }}
            
            ### 📱 ملفات الموقع المضمنة:
            - index.html, auth.html, chat.html, explore.html
            - profile.html, settings.html, notifications.html, upload.html
            - firebase-config.js, service-worker.js
          files: output/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
