name: Build Real APK from Website

on:
  workflow_dispatch:
    inputs:
      website_url:
        description: 'رابط الموقع'
        required: true
        type: string
        default: 'https://example.com'
      app_name:
        description: 'اسم التطبيق'
        required: true
        type: string
        default: 'تطبيقي'
      app_id:
        description: 'معرف الحزمة (مثل com.example.app)'
        required: true
        type: string
        default: 'com.example.app'

jobs:
  scrape-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 تحميل الكود
        uses: actions/checkout@v4

      - name: 🐍 تجهيز Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 تثبيت تبعيات Python
        run: |
          pip install -r requirements.txt

      - name: 🌐 سحب الموقع
        run: |
          python scraper.py "${{ inputs.website_url }}" -o www

      - name: 🟢 تجهيز Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📱 تثبيت Capacitor
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: ⚙️ إنشاء إعدادات Capacitor
        run: |
          cat > capacitor.config.json << EOF
          {
            "appId": "${{ inputs.app_id }}",
            "appName": "${{ inputs.app_name }}",
            "webDir": "www",
            "bundledWebRuntime": false
          }
          EOF

      - name: ☕ تجهيز Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🤖 تجهيز Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: 🔨 بناء مشروع Android
        run: |
          npx cap add android
          npx cap sync android

      - name: 📦 بناء APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📤 رفع APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.app_name }}-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      - name: 📋 عرض النتيجة
        run: |
          echo "✅ تم بناء APK بنجاح!"
          echo "📱 اسم التطبيق: ${{ inputs.app_name }}"
          echo "🌐 الموقع: ${{ inputs.website_url }}"
          echo "📦 حجم الـ APK: $(du -h android/app/build/outputs/apk/debug/app-debug.apk | cut -f1)"
