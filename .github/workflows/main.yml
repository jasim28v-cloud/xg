name: 🌐 Website to APK Builder

on:
  workflow_dispatch:
    inputs:
      website_url:
        description: '🔗 رابط الموقع'
        required: true
        type: string
        default: 'https://example.com'
      app_name:
        description: '📱 اسم التطبيق'
        required: true
        type: string
        default: 'تطبيقي'
      package_name:
        description: '📦 اسم الحزمة'
        required: false
        type: string
        default: 'com.myapp.webview'
      version:
        description: '📌 الإصدار'
        required: false
        type: string
        default: '1.0.0'
      icon_url:
        description: '🎨 رابط الأيقونة (اختياري)'
        required: false
        type: string
        default: ''
      theme_color:
        description: '🎨 لون التطبيق'
        required: false
        type: string
        default: '#2196F3'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    name: 🏗️ بناء APK للموقع
    
    steps:
      - name: 📥 نسخ المستودع
        uses: actions/checkout@v4 # يمكنك ترقيته إلى v5 إذا كان متوفراً قريباً

      - name: 🐍 تثبيت Python
        uses: actions/setup-python@v5 # تم الترقية إلى v5
        with:
          python-version: '3.10'

      - name: 🤖 تثبيت Android SDK
        uses: android-actions/setup-android@v3 # هذه الأداة قد تحتاج لمراجعة بديل إذا لم تُحدث
        with:
          packages: 'platforms;android-33 build-tools;33.0.0'

      - name: 📦 تثبيت الاعتماديات
        run: |
          pip install requests beautifulsoup4

      # تم حذف خطوة تحميل أداة البناء لأنها كانت تسبب الخطأ 8 وهي غير ضرورية.

      - name: 🔨 بناء APK
        run: |
          python scraper.py "${{ github.event.inputs.website_url }}" \
            --name "${{ github.event.inputs.app_name }}" \
            --package "${{ github.event.inputs.package_name }}" \
            --version "${{ github.event.inputs.version }}" \
            ${{ github.event.inputs.icon_url != '' && format('--icon "{0}"', github.event.inputs.icon_url) || '' }} \
            --color "${{ github.event.inputs.theme_color }}"

      - name: 📱 تجميع ملفات APK
        run: |
          mkdir -p release
          cp generated_apks/*.apk release/

      - name: 📤 رفع APK كـ Artifact
        uses: actions/upload-artifact@v4 # يمكنك ترقيته إلى v5 إذا كان متوفراً
        with:
          name: ${{ github.event.inputs.app_name }}-v${{ github.event.inputs.version }}
          path: generated_apks/*.apk
          retention-days: 90

      - name: 🚀 إنشاء Release
        uses: softprops/action-gh-release@v2 # تم الترقية إلى v2
        with:
          tag_name: ${{ github.event.inputs.app_name }}-v${{ github.event.inputs.version }}-${{ github.run_number }}
          name: "${{ github.event.inputs.app_name }} v${{ github.event.inputs.version }}"
          body: |
            ## 🌐 تطبيق ${{ github.event.inputs.app_name }}
            
            - **الموقع:** ${{ github.event.inputs.website_url }}
            - **الإصدار:** ${{ github.event.inputs.version }}
            - **الحزمة:** ${{ github.event.inputs.package_name }}
            - **تاريخ البناء:** $(date +"%Y-%m-%d %H:%M:%S")
            
            ### 📱 تحميل التطبيق
            حمل ملف APK من الأسفل وقم بتثبيته على جهاز الأندرويد.
            
            > ⚠️ تأكد من تفعيل "تثبيت التطبيقات من مصادر غير معروفة" في إعدادات جهازك.
          files: generated_apks/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📊 ملخص البناء
        run: |
          echo "## ✅ تم بناء APK بنجاح" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **التطبيق:** ${{ github.event.inputs.app_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **الموقع:** ${{ github.event.inputs.website_url }}" >> $GITHUB_STEP_SUMMARY
