name: 🤖 Build APK

on:
  workflow_run:
    workflows: ["📁 Create Android Project"]
    types: [completed]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4
      
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: 📥 تحميل المشروع
        uses: actions/download-artifact@v4
        with:
          name: android-project
          path: android_project
      
      - name: 🔨 بناء APK
        run: |
          cd android_project
          chmod +x gradlew 2>/dev/null || true
          gradle assembleRelease || ./gradlew assembleRelease
      
      - name: 📤 رفع APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android_project/app/build/outputs/apk/release/*.apk
      
      - name: 🚀 إنشاء Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Release v${{ github.run_number }}"
          files: android_project/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
