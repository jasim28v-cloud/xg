name: 🃏 Joker APK Builder

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: '📱 اسم التطبيق'
        required: true
        default: 'MyApp'
      package_name:
        description: '📦 اسم الحزمة'
        required: true
        default: 'com.myapp.app'
      version:
        description: '📌 الإصدار'
        required: false
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 🃏 بناء APK
        run: |
          python scraper.py \
            --name "${{ github.event.inputs.app_name }}" \
            --package "${{ github.event.inputs.package_name }}" \
            --version "${{ github.event.inputs.version }}"
      
      - name: 📤 رفع APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-v${{ github.event.inputs.version }}
          path: output/*.apk
          retention-days: 90
      
      - name: 🚀 إنشاء Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}-${{ github.run_number }}
          name: "${{ github.event.inputs.app_name }} v${{ github.event.inputs.version }}"
          body: |
            ## 🃏 ${{ github.event.inputs.app_name }}
            - **الإصدار:** ${{ github.event.inputs.version }}
            - **الحزمة:** ${{ github.event.inputs.package_name }}
            
            ### ✨ المميزات:
            - ✅ يعمل بدون إنترنت
            - ✅ يخزن الصفحات تلقائياً
            - ✅ Service Worker مدمج
            - ✅ يدعم جميع أنواع الملفات
          files: output/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
