name: Build Real APK

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: android-actions/setup-android@v3
      
      - name: Build with Gradle
        run: |
          # إنشاء مشروع أندرويد حقيقي
          mkdir -p app/src/main/java/com/app
          mkdir -p app/src/main/assets
          
          # نسخ ملفاتك
          cp *.html app/src/main/assets/ 2>/dev/null || true
          cp *.js app/src/main/assets/ 2>/dev/null || true
          cp *.css app/src/main/assets/ 2>/dev/null || true
          
          # build.gradle
          echo 'apply plugin: "com.android.application"
          android {
              compileSdk 34
              defaultConfig {
                  applicationId "com.myapp.app"
                  minSdk 21; targetSdk 34; versionCode 1; versionName "1.0"
              }
          }' > app/build.gradle
          
          # AndroidManifest.xml
          echo '<manifest xmlns:android="http://schemas.android.com/apk/res/android"
          package="com.myapp.app">
          <uses-permission android:name="android.permission.INTERNET"/>
          <application android:label="MyApp">
          <activity android:name=".MainActivity" android:exported="true">
          <intent-filter>
          <action android:name="android.intent.action.MAIN"/>
          <category android:name="android.intent.category.LAUNCHER"/>
          </intent-filter></activity></application></manifest>' > app/src/main/AndroidManifest.xml
          
          # MainActivity.java
          echo 'package com.myapp.app;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebView;
          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  WebView wv = new WebView(this);
                  wv.getSettings().setJavaScriptEnabled(true);
                  wv.loadUrl("file:///android_asset/index.html");
                  setContentView(wv);
              }
          }' > app/src/main/java/com/app/MainActivity.java
          
          # build
          gradle assembleRelease
      
      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
