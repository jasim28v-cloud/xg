name: Build Web to APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Android Project
        run: |
          # إنشاء مشروع مؤقت لتغليف ملفات الويب الخاصة بك
          cordova create build_dir com.example.xg xg
          cd build_dir
          cordova platform add android
          # نسخ ملفاتك (index.html, chat.html, إلخ) إلى مجلد Cordova
          cp -R ../*.html ../*.js ../*.py www/
          cordova build android --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: xg-app-release
          path: build_dir/platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk
